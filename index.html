<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KojoScope OSINT</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--accent:#ffca28;--text:#c9d1d9;--muted:#8b949e;--danger:#f85149;--success:#3fb950;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.header h1{font-size:18px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:6px}
.header .status{font-size:12px;padding:3px 10px;border-radius:12px;background:var(--success);color:#000}
.header .status.warn{background:var(--danger)}
.header .read-budget{font-size:11px;color:var(--muted);margin-left:auto}
.alert-banner{padding:8px 12px;font-size:12px;display:none}
.alert-banner.show{display:block}
.alert-banner.error{background:rgba(248,81,73,.15);color:var(--danger);border-bottom:1px solid rgba(248,81,73,.3)}
.tabs{display:flex;gap:0;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto}
.tab-btn{padding:10px 16px;font-size:13px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{padding:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
#map{width:100%;height:45vh}
</style>
</head>
<body>

<div class="header">
    <h1>🛰️ KojoScope</h1>
    <select id="deviceSelect"><option value="">No devices</option></select>
    <span id="readBudget"></span>
</div>

<div class="alert-banner" id="alertBanner"></div>

<div class="tabs" id="tabBar">
    <button class="tab-btn active" data-tab="live">📍 Live</button>
</div>

<div class="content">
    <div id="tab-live">
        <div class="grid">
            <div><div class="label">Latitude</div><div class="value" id="latVal">--</div></div>
            <div><div class="label">Longitude</div><div class="value" id="lngVal">--</div></div>
        </div>
    </div>
</div>

<div id="map"></div>

<script>
// --- 1. ON-SCREEN DEBUGGER (The "Fix" for silent mobile errors) ---
window.onerror = function(msg, url, line) {
    const el = document.getElementById('alertBanner');
    el.textContent = `JS Error: ${msg} (Line ${line})`;
    el.className = 'alert-banner show error';
};

window.fetch = new Proxy(window.fetch, {
  apply(target, thisArg, args) {
    return target.apply(thisArg, args).then(res => {
      if (!res.ok) {
        const el = document.getElementById('alertBanner');
        el.textContent = `Network Error: Status ${res.status} on ${args[0]}`;
        el.className = 'alert-banner show error';
      }
      return res;
    }).catch(err => {
      const el = document.getElementById('alertBanner');
      el.textContent = `Network Failed: ${err.message}`;
      el.className = 'alert-banner show error';
      throw err;
    });
  }
});

// --- 2. CONFIG ---
const RTDB = 'https://instgram-7148c-default-rtdb.europe-west1.firebasedatabase.app';
const FIRESTORE = 'https://firestore.googleapis.com/v1/projects/instgram-7148c/databases/(default)/documents';

// --- 3. ROBUST FETCH (With Cache Busting) ---
async function fetchRTDB(path, query = '') {
    const cacheBuster = `_t=${Date.now()}`;
    const url = `${RTDB}/${path}.json?${query ? query + '&' : ''}${cacheBuster}`;
    try {
        const res = await fetch(url, { headers: { 'Accept': 'application/json' }, cache: 'no-store' });
        return res.ok ? await res.json() : null;
    } catch (e) { return null; }
}

// --- 4. INIT ---
async function init() {
    console.log("KojoScope Initializing...");
    // If this fails, the Proxy/window.onerror will trigger the red banner on your phone
    const test = await fetchRTDB('devices');
    console.log("Fetch result:", test);
}

init();
</script>
</body>
</html>
